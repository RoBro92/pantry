services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      NODE_ENV: development
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NODE_OPTIONS: ${NODE_OPTIONS:---max_old_space_size=2048}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    working_dir: /workspace
    command: >
      /bin/sh -lc
      'export NEXT_PUBLIC_APP_VERSION=$$(cat /workspace/VERSION) &&
      npm run dev --workspace @pantry/web -- --hostname 0.0.0.0 --port 3000'
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - web_next_cache:/workspace/apps/web/.next
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      DEPLOYMENT_MODE: self_hosted
      AI_FEATURE_ENABLED: ${AI_FEATURE_ENABLED:-true}
      APP_VERSION: ${APP_VERSION:-dev}
      IMPORT_STORAGE_ROOT: ${IMPORT_STORAGE_ROOT:-/workspace/.local/imports}
      BACKUP_STORAGE_ROOT: ${BACKUP_STORAGE_ROOT:-/workspace/.local/backups}
      PUBLIC_BROWSER_BASE_URL: ${PUBLIC_BROWSER_BASE_URL:-http://localhost:3000}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-for-development}
      PYTHONPATH: /workspace/apps/api
      WATCHFILES_FORCE_POLLING: "true"
    working_dir: /workspace/apps/api
    command: >
      /bin/sh -lc
      'export APP_VERSION=$$(cat /workspace/VERSION) &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /workspace/apps/api/app
      --reload-dir /workspace/apps/api/alembic'
    volumes:
      - .:/workspace
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      ENVIRONMENT: development
      APP_VERSION: ${APP_VERSION:-dev}
      IMPORT_STORAGE_ROOT: ${IMPORT_STORAGE_ROOT:-/workspace/.local/imports}
      PYTHONPATH: /workspace/apps/api:/workspace/apps/worker
    working_dir: /workspace/apps/worker
    command: >
      /bin/sh -lc
      'export APP_VERSION=$$(cat /workspace/VERSION) &&
      python -m worker.main'
    volumes:
      - ./.local/imports:/workspace/.local/imports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pantry}
      POSTGRES_USER: ${POSTGRES_USER:-pantry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  web_node_modules:
  web_next_cache:
