name: Release Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out the tagged release
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          owner_lc="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${version}" != "${file_version}" ]]; then
            printf 'Tag %s does not match VERSION %s\n' "${tag}" "${file_version}" >&2
            exit 1
          fi

          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "image_namespace=ghcr.io/${owner_lc}"
            echo "source_url=https://github.com/${GITHUB_REPOSITORY}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements-dev.txt

      - name: Validate release inputs
        shell: bash
        run: ./infra/scripts/validate-release.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.production.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.release.outputs.image_namespace }}/pantry-api:${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ steps.release.outputs.source_url }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/worker.production.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.release.outputs.image_namespace }}/pantry-worker:${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ steps.release.outputs.source_url }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.production.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ steps.release.outputs.version }}
          tags: ${{ steps.release.outputs.image_namespace }}/pantry-web:${{ steps.release.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ steps.release.outputs.source_url }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          title="Pantry ${tag}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${title}"
          else
            gh release create "${tag}" --verify-tag --title "${title}" --generate-notes
          fi
