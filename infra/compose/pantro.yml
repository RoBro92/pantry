name: pantro

services:
  web:
    image: ${PANTRO_IMAGE_NAMESPACE:-ghcr.io/robro92}/pantro-web:${PANTRO_VERSION:-0.2.1}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_VERSION: ${PANTRO_VERSION:-0.2.1}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
      INTERNAL_API_PROXY_TOKEN: ${INTERNAL_API_PROXY_TOKEN:-}
    ports:
      - "${WEB_BIND_ADDRESS:-0.0.0.0}:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    image: ${PANTRO_IMAGE_NAMESPACE:-ghcr.io/robro92}/pantro-api:${PANTRO_VERSION:-0.2.1}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      API_SERVICE_NAME: pantro-api
      APP_VERSION: ${PANTRO_VERSION:-0.2.1}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-self_hosted}
      DEMO_MODE_ENABLED: ${DEMO_MODE_ENABLED:-false}
      AI_FEATURE_ENABLED: ${AI_FEATURE_ENABLED:-true}
      WEB_APP_URL: ${WEB_APP_URL}
      API_BASE_URL: ${API_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      IMPORT_STORAGE_ROOT: ${IMPORT_STORAGE_ROOT:-/var/lib/pantro/imports}
      BACKUP_STORAGE_ROOT: ${BACKUP_STORAGE_ROOT:-/var/lib/pantro/backups}
      IMPORT_MAX_UPLOAD_BYTES: ${IMPORT_MAX_UPLOAD_BYTES:-10485760}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-pantro_session}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-604800}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-true}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      CSRF_PROTECTION_ENABLED: ${CSRF_PROTECTION_ENABLED:-true}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      INTERNAL_API_PROXY_TOKEN: ${INTERNAL_API_PROXY_TOKEN:-}
      RATE_LIMIT_REDIS_ENABLED: ${RATE_LIMIT_REDIS_ENABLED:-true}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-10}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      PASSWORD_RESET_RATE_LIMIT_ATTEMPTS: ${PASSWORD_RESET_RATE_LIMIT_ATTEMPTS:-5}
      PASSWORD_RESET_RATE_LIMIT_WINDOW_SECONDS: ${PASSWORD_RESET_RATE_LIMIT_WINDOW_SECONDS:-3600}
      SETUP_MUTATION_RATE_LIMIT_ATTEMPTS: ${SETUP_MUTATION_RATE_LIMIT_ATTEMPTS:-30}
      SETUP_MUTATION_RATE_LIMIT_WINDOW_SECONDS: ${SETUP_MUTATION_RATE_LIMIT_WINDOW_SECONDS:-300}
      PUBLIC_BROWSER_BASE_URL: ${PUBLIC_BROWSER_BASE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OPENAI_COMPAT_BASE_URL: ${OPENAI_COMPAT_BASE_URL:-}
      OPENAI_COMPAT_API_KEY: ${OPENAI_COMPAT_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
      SMTP_SECURITY: ${SMTP_SECURITY:-}
      SMTP_ENABLED: ${SMTP_ENABLED:-}
      SMTP_TIMEOUT_SECONDS: ${SMTP_TIMEOUT_SECONDS:-5}
      RELEASE_CHECK_REPOSITORY: ${RELEASE_CHECK_REPOSITORY:-RoBro92/pantry}
      RELEASE_CHECK_METADATA_URL: ${RELEASE_CHECK_METADATA_URL:-}
      RELEASE_CHECK_TIMEOUT_SECONDS: ${RELEASE_CHECK_TIMEOUT_SECONDS:-5}
    ports:
      - "${API_BIND_ADDRESS:-0.0.0.0}:${API_PORT:-8000}:8000"
    volumes:
      - ${PANTRO_IMPORTS_DATA_DIR:-/srv/pantro/imports}:${IMPORT_STORAGE_ROOT:-/var/lib/pantro/imports}
      - ${PANTRO_BACKUPS_DATA_DIR:-/srv/pantro/backups}:${BACKUP_STORAGE_ROOT:-/var/lib/pantro/backups}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - |
          python - <<'PY'
          import urllib.error
          import urllib.request

          base_url = "http://127.0.0.1:8000"
          try:
              urllib.request.urlopen(f"{base_url}/api/ready", timeout=5).close()
          except urllib.error.HTTPError as exc:
              if exc.code not in (404, 405):
                  raise
              urllib.request.urlopen(f"{base_url}/api/health", timeout=5).close()
          PY
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    image: ${PANTRO_IMAGE_NAMESPACE:-ghcr.io/robro92}/pantro-worker:${PANTRO_VERSION:-0.2.1}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      WORKER_SERVICE_NAME: pantro-worker
      APP_VERSION: ${PANTRO_VERSION:-0.2.1}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      IMPORT_STORAGE_ROOT: ${IMPORT_STORAGE_ROOT:-/var/lib/pantro/imports}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      WORKER_POLL_INTERVAL_SECONDS: ${WORKER_POLL_INTERVAL_SECONDS:-30}
    volumes:
      - ${PANTRO_IMPORTS_DATA_DIR:-/srv/pantro/imports}:${IMPORT_STORAGE_ROOT:-/var/lib/pantro/imports}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -m worker.main --status >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5

  migrate:
    image: ${PANTRO_IMAGE_NAMESPACE:-ghcr.io/robro92}/pantro-api:${PANTRO_VERSION:-0.2.1}
    profiles: ["manual"]
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      APP_VERSION: ${PANTRO_VERSION:-0.2.1}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-self_hosted}
      WEB_APP_URL: ${WEB_APP_URL}
      API_BASE_URL: ${API_BASE_URL}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      IMPORT_STORAGE_ROOT: ${IMPORT_STORAGE_ROOT:-/var/lib/pantro/imports}
      BACKUP_STORAGE_ROOT: ${BACKUP_STORAGE_ROOT:-/var/lib/pantro/backups}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      CSRF_PROTECTION_ENABLED: ${CSRF_PROTECTION_ENABLED:-true}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      RATE_LIMIT_REDIS_ENABLED: ${RATE_LIMIT_REDIS_ENABLED:-true}
    volumes:
      - ${PANTRO_IMPORTS_DATA_DIR:-/srv/pantro/imports}:${IMPORT_STORAGE_ROOT:-/var/lib/pantro/imports}
      - ${PANTRO_BACKUPS_DATA_DIR:-/srv/pantro/backups}:${BACKUP_STORAGE_ROOT:-/var/lib/pantro/backups}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pantro}
      POSTGRES_USER: ${POSTGRES_USER:-pantro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${PANTRO_POSTGRES_DATA_DIR:-/srv/pantro/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${PANTRO_REDIS_DATA_DIR:-/srv/pantro/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
